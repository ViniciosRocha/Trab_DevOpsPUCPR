name: CI - Testes Unitários

on:
  # Executa quando uma PR é criada ou atualizada para o main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  
  # Executa também quando faz push direto no main (opcional)
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Instalar dependências (se houver)
        run: |
          python -m pip install --upgrade pip
      
      - name: Executar testes unitários
        run: |
          python -m unittest test_validador_cpf.py -v
      
      - name: Resultado dos testes
        run: |
          echo "✅ Testes concluídos!"
